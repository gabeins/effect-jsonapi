name: release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  # Required for npm trusted publishing (OIDC) and provenance.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Trusted publishing requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      # Compute the version the release PR will create so it can be used in the
      # PR title and commit message. Apply the bump, read it, then revert so the
      # changesets action performs the real versioning.
      - name: Compute next version
        id: version
        run: |
          pnpm changeset version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          git checkout -- .
          git clean -fd

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: Release ${{ steps.version.outputs.version }}
          commit: ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
